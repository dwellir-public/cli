name: Auto Dependency Updates

on:
  schedule:
    - cron: "21 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-posthog-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Update posthog-go
        run: |
          go get github.com/posthog/posthog-go@latest
          go mod tidy

      - name: Open PR if changes exist
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/auto-update-posthog-go
          delete-branch: true
          title: "chore(deps): update posthog-go"
          commit-message: "chore(deps): update posthog-go"
          labels: dependencies,automated
          body: |
            Automated update for `github.com/posthog/posthog-go`.

            - Trigger: daily scheduled job / workflow_dispatch
            - Scope: Go module dependency update for PostHog SDK
